# 味真足 Redis 配置
# 网络
bind 0.0.0.0
protected-mode no
port 6379
timeout 300
tcp-keepalive 60

# 通用
daemonize no
supervised no
loglevel notice
databases 16

# 内存
maxmemory 512mb
maxmemory-policy allkeys-lru

# 快照
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 慢查询
slowlog-log-slower-than 10000
slowlog-max-len 128
