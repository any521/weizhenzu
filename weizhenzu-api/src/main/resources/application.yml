server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: weizhenzu
  profiles:
    active: dev

  # 文件上传大小限制：10MB
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3307/weizhenzu?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: weizhenzu
    password: weizhenzu123456
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: WeizhenzuHikariCP

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: weizhenzu
    password: weizhenzu123456
    virtual-host: /weizhenzu
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: t_flyway_schema_history

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.weizhenzu.domain.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: weizhenzu-secret-key-must-be-at-least-32-bytes-long-for-hs256
  expire: 7200
  refresh-expire: 604800

# 支付宝沙箱
alipay:
  app-id: 9021000164687969
  private-key: 
  public-key: 
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  charset: UTF-8
  sign-type: RSA2
  format: json
  seller-id: 2088721102490512
  notify-url: http://localhost:8080/api/public/payment/alipay/notify
  return-url: http://localhost:5173/#/pages/order/result

# MinIO 对象存储
minio:
  enabled: true
  endpoint: http://127.0.0.1:9000
  access-key: weizhenzu
  secret-key: weizhenzu123456
  bucket: weizhenzu
  public-domain: http://127.0.0.1:9000
  local-base-path: ./uploads

# 高德地图
amap:
  key: 6c5dac8fc9af3ca41f8b49736264c10e
  regeo-url: https://restapi.amap.com/v3/geocode/regeo
  distance-url: https://restapi.amap.com/v3/distance
  max-radius-km: 10

# 邮件服务（用于发送真实邮箱验证码）
# 说明：登录与注册使用邮箱验证码登录模式，验证码通过 SMTP 真实发送到用户邮箱
# 如需启用，请在 application-dev.yml / application-prod.yml 中覆盖 username / password
mail:
  enabled: true
  host: smtp.163.com
  port: 465
  username: 13837062159@163.com
  password: CGsi9XS9wsz9niru
  protocol: smtps
  default-encoding: UTF-8
  from: 13837062159@163.com
  from-name: 味真足外卖
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: false
        ssl:
          enable: true
        socketFactory:
          class: javax.net.ssl.SSLSocketFactory
      smtps:
        auth: true
        ssl:
          enable: true

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.weizhenzu.api

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    root: INFO
    com.weizhenzu: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
