# 味真足外卖订餐系统 - 基础设施编排（仅中间件）
# 后端应用与前端工程通过本地 IDE / npm 直接运行，连接本编排暴露的端口
# 启动: docker compose up -d
# 停止: docker compose down
# 清理数据: docker compose down -v
# 查看日志: docker compose logs -f mysql

services:
  # ==================== MySQL 8.0 ====================
  # 宿主机访问: 127.0.0.1:3307  (避开本地 3306)
  # 账号: weizhenzu / weizhenzu123456  数据库: weizhenzu
  mysql:
    image: mysql:8.0
    container_name: weizhenzu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-weizhenzu}
      MYSQL_USER: ${MYSQL_USER:-weizhenzu}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-weizhenzu123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-net

  # ==================== Redis 7 ====================
  # 宿主机访问: 127.0.0.1:6379
  redis:
    image: redis:7-alpine
    container_name: weizhenzu-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # ==================== RabbitMQ 3.13 ====================
  # AMQP: 127.0.0.1:5672  管理控制台: http://127.0.0.1:15672
  # 账号: weizhenzu / weizhenzu123456  vhost: /weizhenzu
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: weizhenzu-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-weizhenzu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-weizhenzu123456}
      RABBITMQ_DEFAULT_VHOST: /weizhenzu
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - backend-net

  # ==================== MinIO 对象存储 ====================
  # API: http://127.0.0.1:9000  控制台: http://127.0.0.1:9001
  # 账号: weizhenzu / weizhenzu123456  bucket: weizhenzu
  minio:
    image: minio/minio:latest
    container_name: weizhenzu-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-weizhenzu}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-weizhenzu123456}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - backend-net

  # ==================== MinIO 初始化（自动创建 bucket） ====================
  minio-init:
    image: minio/mc:latest
    container_name: weizhenzu-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-weizhenzu} ${MINIO_SECRET_KEY:-weizhenzu123456};
      mc mb local/weizhenzu --ignore-existing;
      mc anonymous set download local/weizhenzu;
      exit 0;
      "
    networks:
      - backend-net

# ==================== 数据卷 ====================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local
  minio-data:
    driver: local

# ==================== 网络 ====================
networks:
  backend-net:
    driver: bridge
    name: weizhenzu-backend-net
